logging-to-file = true      # enables logging of every patch process to a seperate file
enable-module-update = true # set this to false if you do not want to receive updates for the module
parallel-jobs = 1

# add 'enabled = false' for not patching a specific app or remove it from the config
# see https://github.com/E85Addict/revanced-magisk-module/blob/main/CONFIG.md for more detailed explanations

# you can use rvmm-config-gen to generate a config

[YouTube]
enabled = true
build-mode = "both"
module-prop-name = "youtube-MTech786"
excluded-patches = ""
included-patches = ""
patcher-args = """\
    -e 'Change header' -Ocustom=logos/vanced_og_header/ \
    -e 'Custom branding' -OcustomName='YouTube' -OcustomIcon=logos/vanced_og_launcher/ \
    """
version = "auto"
archive-dlurl = "https://archive.org/download/e85-apks/apks/com.google.android.youtube"
github_release-dlurl = "https://github.com/E85Addict/APKs/releases/latest"
apkmirror-dlurl = "https://apkmirror.com/apk/google-inc/youtube"
uptodown-dlurl = "https://youtube.en.uptodown.com/android"


[Music]
enabled = true
build-mode = "both"
module-prop-name = "music-E85"
arch = "arm64-v8a"
patcher-args = """\
    -e 'Custom branding' -OcustomName='YouTube Music' -OcustomIcon=logos/vanced_og_music_launcher/ \
    """
archive-dlurl = "https://archive.org/download/e85-apks/apks/com.google.android.apps.youtube.music"
github_release-dlurl = "https://github.com/E85Addict/APKs/releases/latest"
apkmirror-dlurl = "https://apkmirror.com/apk/google-inc/youtube-music"
uptodown-dlurl = "https://youtube-music.en.uptodown.com/android"
